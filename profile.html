<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="dashboard">

<div class="dashboard-header">

<h2>👤 Student Profile</h2>

<a href="dashboard.html" class="btn">⬅ Dashboard</a>

</div>

<div class="profile-card">

<img src="https://via.placeholder.com/150" class="profile-img">
<input type="file" id="profileImage" accept="image/*">
<br><br>

<input
type="text"
id="nameInput"
placeholder="Enter Your Name">

<br><br>

<button class="btn" onclick="saveProfile()">
💾 Save Profile
</button>
<h2 id="studentName">Student</h2>

<p id="studentEmail"></p>

<hr>

<p>🏆 Quiz Score : <span id="quizScore">0</span></p>

<p>🔥 Study Streak : <span id="streak">0</span> Days</p>

<p>📅 Joined : July 2026</p>


</div>

</div>

<script src="script.js"></script>

</body>
</html>
